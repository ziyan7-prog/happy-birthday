<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Birthday!</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary-bg: linear-gradient(
          135deg,
          #ffd1dc 0%,
          #fff5e1 50%,
          #e6e6fa 100%
        );
        --accent-pink: #ffb6c1;
        --accent-purple: #dda0dd;
        --accent-gold: #ffd700;
        --text-primary: #5d4e6d;
        --text-secondary: #8b7b8b;
        --card-bg: rgba(255, 255, 255, 0.85);
        --button-primary: #ff69b4;
        --button-hover: #ff1493;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Poppins", sans-serif;
        background: var(--primary-bg);
        min-height: 100vh;
        overflow-x: hidden;
        color: var(--text-primary);
      }

      /* Background Particles */
      .particles {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
      }

      .particle {
        position: absolute;
        border-radius: 50%;
        animation: floatParticle linear infinite;
      }

      .star {
        position: absolute;
        width: 10px;
        height: 10px;
        background: var(--accent-gold);
        clip-path: polygon(
          50% 0%,
          61% 35%,
          98% 35%,
          68% 57%,
          79% 91%,
          50% 70%,
          21% 91%,
          32% 57%,
          2% 35%,
          39% 35%
        );
        animation: twinkle 1.5s ease-in-out infinite;
      }

      .heart {
        position: absolute;
        font-size: 24px;
        animation: floatHeart 4s ease-in-out infinite;
        opacity: 0.7;
      }

      @keyframes floatParticle {
        0% {
          transform: translateY(100vh) rotate(0deg);
          opacity: 1;
        }
        100% {
          transform: translateY(-100vh) rotate(720deg);
          opacity: 0;
        }
      }

      @keyframes twinkle {
        0%,
        100% {
          opacity: 0.3;
          transform: scale(0.8);
        }
        50% {
          opacity: 1;
          transform: scale(1.2);
        }
      }

      @keyframes floatHeart {
        0%,
        100% {
          transform: translateY(0) rotate(0deg);
        }
        50% {
          transform: translateY(-20px) rotate(10deg);
        }
      }

      /* Main Container */
      .container {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      /* Landing Section */
      .landing-section {
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 30px;
      }

      .title-container {
        position: relative;
      }

      .main-title {
        font-family: "Pacifico", cursive;
        font-size: 4rem;
        background: linear-gradient(135deg, #ff69b4, #ffb6c1, #dda0dd, #87ceeb);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: titleBounce 1s ease-out;
        text-shadow: 3px 3px 6px rgba(255, 105, 180, 0.3);
        position: relative;
      }

      .name-highlight {
        display: block;
        font-size: 3rem;
        background: linear-gradient(135deg, #ff1493, #ff69b4);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-top: 10px;
      }

      @keyframes titleBounce {
        0% {
          transform: scale(0.5);
          opacity: 0;
        }
        50% {
          transform: scale(1.1);
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }

      .title-decoration {
        position: absolute;
        width: 100%;
        height: 20px;
        bottom: -10px;
        left: 0;
        display: flex;
        justify-content: center;
        gap: 5px;
      }

      .title-decoration span {
        font-size: 1.2rem;
        animation: heartBeat 1s ease-in-out infinite;
      }

      .title-decoration span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .title-decoration span:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes heartBeat {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.3);
        }
      }

      /* Music Button */
      .music-btn {
        position: fixed;
        top: 20px;
        right: 20px;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        border: none;
        background: white;
        box-shadow: 0 4px 15px rgba(255, 105, 180, 0.3);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        transition: all 0.3s ease;
        z-index: 100;
      }

      .music-btn:hover {
        transform: scale(1.1);
        box-shadow: 0 6px 20px rgba(255, 105, 180, 0.5);
      }

      .music-btn.playing {
        animation: pulse 1s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          box-shadow: 0 4px 15px rgba(255, 105, 180, 0.3);
        }
        50% {
          box-shadow: 0 4px 25px rgba(255, 105, 180, 0.6);
        }
      }

      /* Surprise Button */
      .surprise-btn {
        padding: 18px 40px;
        font-size: 1.2rem;
        font-family: "Poppins", sans-serif;
        font-weight: 600;
        color: white;
        background: linear-gradient(135deg, #ff69b4, #ff1493);
        border: none;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 8px 30px rgba(255, 105, 180, 0.4);
        transition: all 0.3s ease;
        animation: bounce 2s ease-in-out infinite;
        position: relative;
        overflow: hidden;
      }

      .surprise-btn::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        background: rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        transition:
          width 0.6s,
          height 0.6s;
      }

      .surprise-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 12px 40px rgba(255, 105, 180, 0.6);
      }

      .surprise-btn:hover::before {
        width: 300px;
        height: 300px;
      }

      @keyframes bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }

      /* Surprise Section */
      .surprise-section {
        display: none;
        width: 100%;
        max-width: 900px;
        flex-direction: column;
        gap: 40px;
        opacity: 0;
        transform: translateY(50px);
        transition: all 0.8s ease;
      }

      .surprise-section.active {
        display: flex;
        opacity: 1;
        transform: translateY(0);
      }

      /* Slideshow */
      .slideshow-container {
        position: relative;
        width: 100%;
        height: 350px;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 10px 40px rgba(255, 105, 180, 0.2);
      }

      .slide {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
        transition: opacity 0.8s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #ffe4ec, #e8e4ff);
      }

      .slide.active {
        opacity: 1;
      }

      .slide img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .slide-content {
        text-align: center;
        padding: 20px;
      }

      .slide-emoji {
        font-size: 5rem;
        margin-bottom: 10px;
      }

      .slide-text {
        font-size: 1.5rem;
        font-family: "Pacifico", cursive;
        color: var(--text-primary);
      }

      .slideshow-dots {
        position: absolute;
        bottom: 15px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 10px;
      }

      .dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.5);
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .dot.active {
        background: var(--button-primary);
        transform: scale(1.2);
      }

      /* Message Card */
      .message-card {
        background: var(--card-bg);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 10px 40px rgba(255, 105, 180, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.5);
      }

      .message-title {
        font-family: "Pacifico", cursive;
        font-size: 2rem;
        text-align: center;
        margin-bottom: 20px;
        color: var(--button-primary);
      }

      .message-text {
        font-size: 1.1rem;
        line-height: 1.8;
        color: var(--text-primary);
        text-align: center;
      }

      .typing-cursor {
        display: inline-block;
        width: 2px;
        height: 1.2em;
        background: var(--button-primary);
        margin-left: 2px;
        animation: blink 0.7s infinite;
        vertical-align: text-bottom;
      }

      @keyframes blink {
        0%,
        50% {
          opacity: 1;
        }
        51%,
        100% {
          opacity: 0;
        }
      }

      /* Balloons */
      .balloons-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
      }

      .balloon {
        position: absolute;
        bottom: -100px;
        width: 60px;
        height: 80px;
        border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
        animation: floatBalloon linear forwards;
        opacity: 0.8;
      }

      .balloon::before {
        content: "";
        position: absolute;
        top: 15%;
        left: 20%;
        width: 25%;
        height: 20%;
        background: rgba(255, 255, 255, 0.4);
        border-radius: 50%;
      }

      .balloon::after {
        content: "";
        position: absolute;
        bottom: -20px;
        left: 50%;
        transform: translateX(-50%);
        width: 2px;
        height: 20px;
        background: rgba(0, 0, 0, 0.2);
      }

      @keyframes floatBalloon {
        0% {
          transform: translateY(0) rotate(0deg);
        }
        25% {
          transform: translateY(-25vh) rotate(5deg);
        }
        50% {
          transform: translateY(-50vh) rotate(-5deg);
        }
        75% {
          transform: translateY(-75vh) rotate(5deg);
        }
        100% {
          transform: translateY(-120vh) rotate(0deg);
          opacity: 0;
        }
      }

      /* Confetti */
      .confetti-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 1000;
        overflow: hidden;
      }

      .confetti {
        position: absolute;
        width: 10px;
        height: 10px;
        top: -10px;
        animation: confettiFall linear forwards;
      }

      @keyframes confettiFall {
        0% {
          transform: translateY(0) rotate(0deg);
          opacity: 1;
        }
        100% {
          transform: translateY(100vh) rotate(720deg);
          opacity: 0;
        }
      }

      /* Responsive */
      @media (max-width: 768px) {
        .main-title {
          font-size: 2.5rem;
        }

        .name-highlight {
          font-size: 2rem;
        }

        .surprise-btn {
          padding: 15px 30px;
          font-size: 1rem;
        }

        .slideshow-container {
          height: 280px;
        }

        .message-card {
          padding: 25px;
        }

        .message-title {
          font-size: 1.5rem;
        }

        .message-text {
          font-size: 1rem;
        }

        .slide-emoji {
          font-size: 3.5rem;
        }

        .slide-text {
          font-size: 1.2rem;
        }
      }

      @media (max-width: 480px) {
        .main-title {
          font-size: 2rem;
        }

        .name-highlight {
          font-size: 1.6rem;
        }

        .slideshow-container {
          height: 250px;
        }
      }

      /* Fade animations */
      .fade-in {
        animation: fadeIn 0.5s ease forwards;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Sparkle effect */
      .sparkle {
        position: absolute;
        width: 4px;
        height: 4px;
        background: white;
        border-radius: 50%;
        animation: sparkle 1s ease-in-out infinite;
      }

      @keyframes sparkle {
        0%,
        100% {
          opacity: 0;
          transform: scale(0);
        }
        50% {
          opacity: 1;
          transform: scale(1);
        }
      }

      /* Romantic Button */
      .romantic-btn {
        padding: 18px 40px;
        font-size: 1.1rem;
        font-family: "Poppins", sans-serif;
        font-weight: 600;
        color: white;
        background: linear-gradient(135deg, #dda0dd, #ff69b4);
        border: none;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 8px 30px rgba(221, 160, 221, 0.4);
        transition: all 0.3s ease;
        animation: bounce 2s ease-in-out infinite;
      }

      .romantic-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 12px 40px rgba(221, 160, 221, 0.6);
      }

      /* Romantic Section */
      .romantic-section {
        display: none;
        width: 100%;
        max-width: 900px;
        flex-direction: column;
        gap: 30px;
        opacity: 0;
        transform: translateY(50px);
        transition: all 0.8s ease;
        padding: 20px;
      }

      .romantic-section.active {
        display: flex;
        opacity: 1;
        transform: translateY(0);
      }

      .romantic-title {
        font-family: "Pacifico", cursive;
        font-size: 2.5rem;
        text-align: center;
        color: var(--button-primary);
        margin-bottom: 20px;
      }

      /* Back Button */
      .back-btn {
        position: fixed;
        top: 20px;
        left: 20px;
        padding: 12px 25px;
        font-size: 1rem;
        font-family: "Poppins", sans-serif;
        font-weight: 500;
        color: white;
        background: linear-gradient(135deg, #ff69b4, #ff1493);
        border: none;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(255, 105, 180, 0.3);
        transition: all 0.3s ease;
        z-index: 100;
      }

      .back-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 6px 20px rgba(255, 105, 180, 0.5);
      }

      /* Photo Grid */
      .photo-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 15px;
        margin-bottom: 20px;
      }

      .photo-item {
        position: relative;
        aspect-ratio: 1;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 5px 20px rgba(255, 105, 180, 0.2);
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .photo-item:hover {
        transform: scale(1.05);
        box-shadow: 0 8px 30px rgba(255, 105, 180, 0.4);
      }

      .photo-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* Lightbox */
      .lightbox {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.9);
        z-index: 2000;
        align-items: center;
        justify-content: center;
      }

      .lightbox.active {
        display: flex;
      }

      .lightbox-content {
        max-width: 90%;
        max-height: 80%;
        border-radius: 20px;
        box-shadow: 0 10px 50px rgba(255, 105, 180, 0.5);
      }

      .lightbox-close {
        position: absolute;
        top: 30px;
        right: 30px;
        font-size: 2rem;
        color: white;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .lightbox-close:hover {
        color: var(--button-primary);
        transform: scale(1.2);
      }

      .lightbox-nav {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        font-size: 2rem;
        color: white;
        cursor: pointer;
        padding: 20px;
        transition: all 0.3s ease;
      }

      .lightbox-nav:hover {
        color: var(--button-primary);
        transform: translateY(-50%) scale(1.2);
      }

      .lightbox-prev {
        left: 20px;
      }

      .lightbox-next {
        right: 20px;
      }

      /* Navigation Buttons */
      .nav-buttons {
        display: flex;
        justify-content: center;
        gap: 20px;
      }

      .nav-btn {
        padding: 12px 30px;
        font-size: 1rem;
        font-family: "Poppins", sans-serif;
        font-weight: 500;
        color: white;
        background: linear-gradient(135deg, #ff69b4, #ff1493);
        border: none;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(255, 105, 180, 0.3);
        transition: all 0.3s ease;
      }

      .nav-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 6px 20px rgba(255, 105, 180, 0.5);
      }

      @media (max-width: 768px) {
        .photo-grid {
          grid-template-columns: repeat(2, 1fr);
        }

        .romantic-title {
          font-size: 1.8rem;
        }
      }

      @media (max-width: 480px) {
        .photo-grid {
          grid-template-columns: 1fr;
        }

        .romantic-title {
          font-size: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <!-- Background Particles -->
    <div class="particles" id="particles"></div>

    <!-- Confetti Container -->
    <div class="confetti-container" id="confetti"></div>

    <!-- Balloons Container -->
    <div class="balloons-container" id="balloons"></div>

    <!-- Music Button -->
    <button class="music-btn" id="musicBtn" title="Putar musik ulang tahun">
      🎵
    </button>

    <!-- Main Container -->
    <div class="container">
      <!-- Landing Section -->
      <div class="landing-section" id="landingSection">
        <div class="title-container">
          <h1 class="main-title">
            Happy Birthday
            <span class="name-highlight">Sayang! ❤️</span>
          </h1>
          <div class="title-decoration">
            <span>💕</span>
            <span>❤️</span>
            <span>💕</span>
          </div>
        </div>

        <button class="surprise-btn" id="surpriseBtn">
          Klik untuk membuka kejutan 🎁
        </button>
      </div>

      <!-- Surprise Section -->
      <div class="surprise-section" id="surpriseSection">
        <!-- Slideshow -->
        <div class="slideshow-container" id="slideshow">
          <div class="slide active">
            <div class="slide-content">
              <div class="slide-emoji">🎂</div>
              <div class="slide-text">Selamat Ulang Tahun!</div>
            </div>
          </div>
          <div class="slide">
            <div class="slide-content">
              <div class="slide-emoji">🎉</div>
              <div class="slide-text">Harapanmu Menjadi Kenyataan!</div>
            </div>
          </div>
          <div class="slide">
            <div class="slide-content">
              <div class="slide-emoji">🌟</div>
              <div class="slide-text">Tahun Baru yang Indah!</div>
            </div>
          </div>
          <div class="slide">
            <div class="slide-content">
              <div class="slide-emoji">💖</div>
              <div class="slide-text">Disayang Selalu!</div>
            </div>
          </div>
          <div class="slide">
            <div class="slide-content">
              <div class="slide-emoji">🥳</div>
              <div class="slide-text">Happy Birthday!</div>
            </div>
          </div>
          <div class="slideshow-dots" id="slideshowDots"></div>
        </div>

        <!-- Message Card -->
        <div class="message-card">
          <h2 class="message-title">💌 Pesan Spesial Untukmu 💌</h2>
          <p class="message-text" id="messageText">
            <span class="typing-cursor"></span>
          </p>
        </div>

        <!-- Button to Romantic Photos -->
        <button class="romantic-btn" id="romanticBtn">
          Lihat Foto Kita 💕
        </button>
      </div>

      <!-- Romantic Photos Section -->
      <div class="romantic-section" id="romanticSection">
        <button class="back-btn" id="backBtn">← Kembali</button>

        <h2 class="romantic-title">📸 Momen Kita 💖</h2>

        <div class="photo-grid" id="photoGrid">
          <!-- Photos will be added here -->
        </div>

        <div class="nav-buttons">
          <button class="nav-btn" id="prevPhotoBtn">← Prev</button>
          <button class="nav-btn" id="nextPhotoBtn">Next →</button>
        </div>
      </div>

      <!-- Lightbox -->
      <div class="lightbox" id="lightbox">
        <span class="lightbox-close" id="lightboxClose">✕</span>
        <span class="lightbox-nav lightbox-prev" id="lightboxPrev">❮</span>
        <img class="lightbox-content" id="lightboxContent" src="" alt="" />
        <span class="lightbox-nav lightbox-next" id="lightboxNext">❯</span>
      </div>
    </div>

    <script>
      // Configuration
      const birthdayName = "Sayang";
      const message = `Selamat ulang tahun yang ke-22 Bucaa Tercinta, ${birthdayName}! 🎂🎉

Di hari spesial ini, aku ingin mengucapkan bahwa kehadiranmu dalam hidupku adalah anugerah yang paling indah. Kamu adalah senyum pagi yang menyegarkan, tawa yang membuat hariku bersinar, dan inspirasi yang membuatku ingin menjadi lebih baik setiap hari.

Doaku untukmu hari ini dan selamanya adalah kebahagiaan yang melimpah, kesehatan yang prima, cinta yang tulus dari orang-orang tersayang, dan kesuksesan dalam setiap langkah hidupmu.

Terima kasih sudah menjadi kamu - seseorang yang begitu luar biasa, baik hati, dan penuh kasih. Kamu membuat dunia ini menjadi tempat yang lebih baik hanya dengan keberadaanmu.

Semoga tahun baru hidupmu dipenuhi dengan moment-moment indah, pencapaian-pencapaian menakjubkan, dan cinta yang tak terhitung.

      // DOM Elements
      const musicBtn = document.getElementById("musicBtn");
      const surpriseBtn = document.getElementById("surpriseBtn");
      const landingSection = document.getElementById("landingSection");
      const surpriseSection = document.getElementById("surpriseSection");
      const messageText = document.getElementById("messageText");
      const slideshow = document.getElementById("slideshow");
      const slideshowDots = document.getElementById("slideshowDots");
      const confettiContainer = document.getElementById("confetti");
      const balloonsContainer = document.getElementById("balloons");
      const particlesContainer = document.getElementById("particles");

      // Audio Context for birthday music
      let audioContext = null;
      let isPlaying = false;
      let oscillator = null;
      let gainNode = null;

      // Create background particles
      function createParticles() {
        // Stars
        for (let i = 0; i < 20; i++) {
          const star = document.createElement("div");
          star.className = "star";
          star.style.left = Math.random() * 100 + "%";
          star.style.top = Math.random() * 100 + "%";
          star.style.animationDelay = Math.random() * 2 + "s";
          particlesContainer.appendChild(star);
        }

        // Hearts
        for (let i = 0; i < 15; i++) {
          const heart = document.createElement("div");
          heart.className = "heart";
          heart.innerHTML = ["💕", "💖", "💗", "❤️", "💓"][
            Math.floor(Math.random() * 5)
          ];
          heart.style.left = Math.random() * 100 + "%";
          heart.style.top = Math.random() * 100 + "%";
          heart.style.animationDelay = Math.random() * 2 + "s";
          heart.style.fontSize = Math.random() * 15 + 15 + "px";
          particlesContainer.appendChild(heart);
        }
      }

      // Create confetti
      function createConfetti() {
        const colors = [
          "#FF69B4",
          "#FFB6C1",
          "#DDA0DD",
          "#87CEEB",
          "#FFD700",
          "#98FB98",
          "#FFA07A",
        ];
        const shapes = ["circle", "square", "rectangle"];

        for (let i = 0; i < 100; i++) {
          const confetti = document.createElement("div");
          confetti.className = "confetti";
          confetti.style.left = Math.random() * 100 + "%";
          confetti.style.background =
            colors[Math.floor(Math.random() * colors.length)];
          confetti.style.width = Math.random() * 10 + 5 + "px";
          confetti.style.height = Math.random() * 10 + 5 + "px";
          confetti.style.borderRadius =
            shapes[Math.floor(Math.random() * shapes.length)] === "circle"
              ? "50%"
              : "0";
          confetti.style.animationDuration = Math.random() * 2 + 2 + "s";
          confetti.style.animationDelay = Math.random() * 2 + "s";
          confettiContainer.appendChild(confetti);
        }

        // Remove confetti after animation
        setTimeout(() => {
          confettiContainer.innerHTML = "";
        }, 6000);
      }

      // Create balloons
      function createBalloon() {
        const colors = [
          "#FF69B4",
          "#FFB6C1",
          "#DDA0DD",
          "#87CEEB",
          "#FFD700",
          "#FFA07A",
          "#98FB98",
        ];
        const balloon = document.createElement("div");
        balloon.className = "balloon";
        balloon.style.left = Math.random() * 100 + "%";
        balloon.style.background = `linear-gradient(135deg, ${colors[Math.floor(Math.random() * colors.length)]}, ${colors[Math.floor(Math.random() * colors.length)]})`;
        balloon.style.animationDuration = Math.random() * 5 + 8 + "s";
        balloon.style.width = Math.random() * 30 + 50 + "px";
        balloon.style.height = Math.random() * 40 + 70 + "px";
        balloonsContainer.appendChild(balloon);

        // Remove balloon after animation
        setTimeout(() => {
          balloon.remove();
        }, 13000);
      }

      // Create slideshow dots
      function createSlideshowDots() {
        const slideElements = document.querySelectorAll(".slide");
        slideElements.forEach((_, index) => {
          const dot = document.createElement("div");
          dot.className = "dot" + (index === 0 ? " active" : "");
          dot.addEventListener("click", () => goToSlide(index));
          slideshowDots.appendChild(dot);
        });
      }

      // Slideshow functionality
      let currentSlide = 0;

      function getSlides() {
        return document.querySelectorAll(".slide");
      }

      function getDots() {
        return document.querySelectorAll(".dot");
      }

      function goToSlide(index) {
        const slides = getSlides();
        const dots = getDots();
        if (slides.length === 0 || dots.length === 0) return;

        slides[currentSlide].classList.remove("active");
        dots[currentSlide].classList.remove("active");
        currentSlide = index;
        slides[currentSlide].classList.add("active");
        dots[currentSlide].classList.add("active");
      }

      function nextSlide() {
        const slides = getSlides();
        if (slides.length === 0) return;
        goToSlide((currentSlide + 1) % slides.length);
      }

      // Typing effect
      let charIndex = 0;
      function typeMessage() {
        if (charIndex < message.length) {
          const char = message[charIndex];
          if (char === "\n") {
            messageText.innerHTML = messageText.innerHTML.replace(
              '<span class="typing-cursor"></span>',
              '<br><span class="typing-cursor"></span>',
            );
          } else {
            messageText.innerHTML =
              messageText.innerHTML.replace(
                '<span class="typing-cursor"></span>',
                "",
              ) +
              char +
              '<span class="typing-cursor"></span>';
          }
          charIndex++;
          setTimeout(typeMessage, 50);
        }
      }

      // Music - Using MP3 file
      let birthdayAudio = null;

      function playBirthdaySong() {
        if (!birthdayAudio) {
          birthdayAudio = new Audio("lagu.mp3");
          birthdayAudio.loop = true;
        }
        birthdayAudio.play();
      }

      function stopMusic() {
        if (birthdayAudio) {
          birthdayAudio.pause();
          birthdayAudio.currentTime = 0;
        }
      }

      function toggleMusic() {
        isPlaying = !isPlaying;
        musicBtn.classList.toggle("playing", isPlaying);

        if (isPlaying) {
          playBirthdaySong();
        } else {
          stopMusic();
        }
      }

      // Surprise button click
      let surpriseOpened = false;
      function openSurprise() {
        if (surpriseOpened) return;
        surpriseOpened = true;

        // Create balloons continuously
        const balloonInterval = setInterval(() => {
          if (!surpriseOpened) {
            clearInterval(balloonInterval);
            return;
          }
          createBalloon();
        }, 800);

        // Show surprise section
        landingSection.style.display = "none";
        surpriseSection.classList.add("active");

        // Start slideshow
        setInterval(nextSlide, 3000);

        // Start typing after a delay
        setTimeout(typeMessage, 1000);
      }

      // Romantic Photos - DOM Elements
      const romanticBtn = document.getElementById("romanticBtn");
      const romanticSection = document.getElementById("romanticSection");
      const backBtn = document.getElementById("backBtn");
      const photoGrid = document.getElementById("photoGrid");
      const prevPhotoBtn = document.getElementById("prevPhotoBtn");
      const nextPhotoBtn = document.getElementById("nextPhotoBtn");
      const lightbox = document.getElementById("lightbox");
      const lightboxContent = document.getElementById("lightboxContent");
      const lightboxClose = document.getElementById("lightboxClose");
      const lightboxPrev = document.getElementById("lightboxPrev");
      const lightboxNext = document.getElementById("lightboxNext");

      // Photo data - Using local photos from folder
      const romanticPhotos = [
        "foto1.jpeg",
        "foto2.jpg",
        "foto3.jpg",
        "foto4.jpeg",
        "foto5.jpeg",
        "foto6.jpg",
        "foto7.jpg",
        "foto8.jpg",
        "foto9.jpg",
        "foto10.jpg",
        "foto11.jpg",
        "foto12.jpg",
      ];

      let currentPhotoIndex = 0;

      // Create photo grid
      function createPhotoGrid() {
        romanticPhotos.forEach((photo, index) => {
          const photoItem = document.createElement("div");
          photoItem.className = "photo-item";
          photoItem.innerHTML = `<img src="${photo}" alt="Photo ${index + 1}">`;
          photoItem.addEventListener("click", () => openLightbox(index));
          photoGrid.appendChild(photoItem);
        });
      }

      // Open lightbox
      function openLightbox(index) {
        currentPhotoIndex = index;
        lightboxContent.src = romanticPhotos[currentPhotoIndex];
        lightbox.classList.add("active");
      }

      // Close lightbox
      function closeLightbox() {
        lightbox.classList.remove("active");
      }

      // Navigate lightbox
      function navigateLightbox(direction) {
        currentPhotoIndex += direction;
        if (currentPhotoIndex < 0) {
          currentPhotoIndex = romanticPhotos.length - 1;
        } else if (currentPhotoIndex >= romanticPhotos.length) {
          currentPhotoIndex = 0;
        }
        lightboxContent.src = romanticPhotos[currentPhotoIndex];
      }

      // Open romantic section
      function openRomanticSection() {
        surpriseSection.style.display = "none";
        romanticSection.classList.add("active");
      }

      // Go back to surprise section
      function goBack() {
        romanticSection.classList.remove("active");
        surpriseSection.style.display = "flex";
      }

      // Event Listeners
      musicBtn.addEventListener("click", toggleMusic);
      surpriseBtn.addEventListener("click", openSurprise);
      romanticBtn.addEventListener("click", openRomanticSection);
      backBtn.addEventListener("click", goBack);
      prevPhotoBtn.addEventListener(
        "click",
        () =>
          (currentPhotoIndex =
            (currentPhotoIndex - 1 + romanticPhotos.length) %
            romanticPhotos.length),
      );
      nextPhotoBtn.addEventListener(
        "click",
        () =>
          (currentPhotoIndex = (currentPhotoIndex + 1) % romanticPhotos.length),
      );
      lightboxClose.addEventListener("click", closeLightbox);
      lightboxPrev.addEventListener("click", () => navigateLightbox(-1));
      lightboxNext.addEventListener("click", () => navigateLightbox(1));

      // Close lightbox when clicking outside
      lightbox.addEventListener("click", (e) => {
        if (e.target === lightbox) {
          closeLightbox();
        }
      });

      // Initialize
      createParticles();
      createConfetti();
      createSlideshowDots();
      createPhotoGrid();

      // Create initial balloons
      for (let i = 0; i < 8; i++) {
        setTimeout(createBalloon, i * 500);
      }
    </script>
  </body>
