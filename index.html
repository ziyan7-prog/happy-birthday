<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Birthday!</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary-bg: linear-gradient(
          135deg,
          #ffd1dc 0%,
          #fff5e1 50%,
          #e6e6fa 100%
        );
        --accent-pink: #ffb6c1;
        --accent-purple: #dda0dd;
        --accent-gold: #ffd700;
        --text-primary: #5d4e6d;
        --text-secondary: #8b7b8b;
        --card-bg: rgba(255, 255, 255, 0.85);
        --button-primary: #ff69b4;
        --button-hover: #ff1493;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Poppins", sans-serif;
        background: var(--primary-bg);
        min-height: 100vh;
        overflow-x: hidden;
        color: var(--text-primary);
      }

      .particles {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
      }

      .star {
        position: absolute;
        width: 10px;
        height: 10px;
        background: var(--accent-gold);
        clip-path: polygon(
          50% 0%,
          61% 35%,
          98% 35%,
          68% 57%,
          79% 91%,
          50% 70%,
          21% 91%,
          32% 57%,
          2% 35%,
          39% 35%
        );
        animation: twinkle 1.5s ease-in-out infinite;
      }

      .heart {
        position: absolute;
        font-size: 24px;
        animation: floatHeart 4s ease-in-out infinite;
        opacity: 0.7;
      }

      @keyframes twinkle {
        0%,
        100% {
          opacity: 0.3;
          transform: scale(0.8);
        }
        50% {
          opacity: 1;
          transform: scale(1.2);
        }
      }
      @keyframes floatHeart {
        0%,
        100% {
          transform: translateY(0) rotate(0deg);
        }
        50% {
          transform: translateY(-20px) rotate(10deg);
        }
      }

      .container {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .landing-section {
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 30px;
      }

      .title-container {
        position: relative;
      }

      .main-title {
        font-family: "Pacifico", cursive;
        font-size: 4rem;
        background: linear-gradient(135deg, #ff69b4, #ffb6c1, #dda0dd, #87ceeb);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: titleBounce 1s ease-out;
        text-shadow: 3px 3px 6px rgba(255, 105, 180, 0.3);
        position: relative;
      }

      .name-highlight {
        display: block;
        font-size: 3rem;
        background: linear-gradient(135deg, #ff1493, #ff69b4);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-top: 10px;
      }

      @keyframes titleBounce {
        0% {
          transform: scale(0.5);
          opacity: 0;
        }
        50% {
          transform: scale(1.1);
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }

      .title-decoration {
        position: absolute;
        width: 100%;
        height: 20px;
        bottom: -10px;
        left: 0;
        display: flex;
        justify-content: center;
        gap: 5px;
      }
      .title-decoration span {
        font-size: 1.2rem;
        animation: heartBeat 1s ease-in-out infinite;
      }
      .title-decoration span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .title-decoration span:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes heartBeat {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.3);
        }
      }

      .music-btn {
        position: fixed;
        top: 20px;
        right: 20px;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        border: none;
        background: white;
        box-shadow: 0 4px 15px rgba(255, 105, 180, 0.3);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        transition: all 0.3s ease;
        z-index: 100;
      }
      .music-btn:hover {
        transform: scale(1.1);
        box-shadow: 0 6px 20px rgba(255, 105, 180, 0.5);
      }
      .music-btn.playing {
        animation: pulse 1s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          box-shadow: 0 4px 15px rgba(255, 105, 180, 0.3);
        }
        50% {
          box-shadow: 0 4px 25px rgba(255, 105, 180, 0.6);
        }
      }

      .surprise-btn {
        padding: 18px 40px;
        font-size: 1.2rem;
        font-family: "Poppins", sans-serif;
        font-weight: 600;
        color: white;
        background: linear-gradient(135deg, #ff69b4, #ff1493);
        border: none;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 8px 30px rgba(255, 105, 180, 0.4);
        transition: all 0.3s ease;
        animation: bounce 2s ease-in-out infinite;
        position: relative;
        overflow: hidden;
      }
      .surprise-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 12px 40px rgba(255, 105, 180, 0.6);
      }
      @keyframes bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-10px);
        }
      }

      .surprise-section {
        display: none;
        width: 100%;
        max-width: 900px;
        flex-direction: column;
        gap: 40px;
        opacity: 0;
        transform: translateY(50px);
        transition: all 0.8s ease;
      }
      .surprise-section.active {
        display: flex;
        opacity: 1;
        transform: translateY(0);
      }

      .slideshow-container {
        position: relative;
        width: 100%;
        height: 350px;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 10px 40px rgba(255, 105, 180, 0.2);
      }
      .slide {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
        transition: opacity 0.8s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #ffe4ec, #e8e4ff);
      }
      .slide.active {
        opacity: 1;
      }
      .slide-content {
        text-align: center;
        padding: 20px;
      }
      .slide-emoji {
        font-size: 5rem;
        margin-bottom: 10px;
      }
      .slide-text {
        font-size: 1.5rem;
        font-family: "Pacifico", cursive;
        color: var(--text-primary);
      }
      .slideshow-dots {
        position: absolute;
        bottom: 15px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 10px;
      }
      .dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.5);
        cursor: pointer;
        transition: all 0.3s ease;
      }
      .dot.active {
        background: var(--button-primary);
        transform: scale(1.2);
      }

      .message-card {
        background: var(--card-bg);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 10px 40px rgba(255, 105, 180, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.5);
      }
      .message-title {
        font-family: "Pacifico", cursive;
        font-size: 2rem;
        text-align: center;
        margin-bottom: 20px;
        color: var(--button-primary);
      }
      .message-text {
        font-size: 1.1rem;
        line-height: 1.8;
        color: var(--text-primary);
        text-align: center;
      }
      .typing-cursor {
        display: inline-block;
        width: 2px;
        height: 1.2em;
        background: var(--button-primary);
        margin-left: 2px;
        animation: blink 0.7s infinite;
        vertical-align: text-bottom;
      }
      @keyframes blink {
        0%,
        50% {
          opacity: 1;
        }
        51%,
        100% {
          opacity: 0;
        }
      }

      .balloons-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
      }
      .balloon {
        position: absolute;
        bottom: -100px;
        width: 60px;
        height: 80px;
        border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
        animation: floatBalloon linear forwards;
        opacity: 0.8;
      }
      .balloon::before {
        content: "";
        position: absolute;
        top: 15%;
        left: 20%;
        width: 25%;
        height: 20%;
        background: rgba(255, 255, 255, 0.4);
        border-radius: 50%;
      }
      .balloon::after {
        content: "";
        position: absolute;
        bottom: -20px;
        left: 50%;
        transform: translateX(-50%);
        width: 2px;
        height: 20px;
        background: rgba(0, 0, 0, 0.2);
      }
      @keyframes floatBalloon {
        0% {
          transform: translateY(0) rotate(0deg);
        }
        100% {
          transform: translateY(-120vh) rotate(0deg);
          opacity: 0;
        }
      }

      .confetti-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 1000;
        overflow: hidden;
      }
      .confetti {
        position: absolute;
        width: 10px;
        height: 10px;
        top: -10px;
        animation: confettiFall linear forwards;
      }
      @keyframes confettiFall {
        0% {
          transform: translateY(0) rotate(0deg);
          opacity: 1;
        }
        100% {
          transform: translateY(100vh) rotate(720deg);
          opacity: 0;
        }
      }

      .romantic-section {
        display: none;
        width: 100%;
        max-width: 900px;
        flex-direction: column;
        gap: 20px;
        opacity: 0;
        transform: translateY(50px);
        transition: all 0.8s ease;
        padding: 20px;
      }
      .romantic-section.active {
        display: flex;
        opacity: 1;
        transform: translateY(0);
      }

      .romantic-header {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
      }
      .romantic-title {
        font-family: "Pacifico", cursive;
        font-size: 2.5rem;
        text-align: center;
        color: var(--button-primary);
      }

      .photo-slider {
        position: relative;
        width: 100%;
        max-width: 500px;
        aspect-ratio: 1;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 10px 40px rgba(255, 105, 180, 0.3);
        margin: 0 auto;
      }
      .photo-slide {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0;
        transition: opacity 0.5s ease;
      }
      .photo-slide.active {
        opacity: 1;
      }
      .photo-slide img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .photo-counter {
        text-align: center;
        font-size: 1rem;
        color: var(--text-secondary);
      }

      .nav-buttons {
        display: flex;
        justify-content: center;
        gap: 20px;
      }
      .nav-btn {
        padding: 12px 30px;
        font-size: 1rem;
        font-family: "Poppins", sans-serif;
        font-weight: 500;
        color: white;
        background: linear-gradient(135deg, #ff69b4, #ff1493);
        border: none;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(255, 105, 180, 0.3);
        transition: all 0.3s ease;
      }
      .nav-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 6px 20px rgba(255, 105, 180, 0.5);
      }

      .back-btn {
        align-self: center;
        padding: 12px 25px;
        font-size: 1rem;
        font-family: "Poppins", sans-serif;
        font-weight: 500;
        color: white;
        background: linear-gradient(135deg, #ff69b4, #ff1493);
        border: none;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(255, 105, 180, 0.3);
        transition: all 0.3s ease;
      }
      .back-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 6px 20px rgba(255, 105, 180, 0.5);
      }

      @media (max-width: 768px) {
        .main-title {
          font-size: 2.5rem;
        }
        .name-highlight {
          font-size: 2rem;
        }
        .surprise-btn {
          padding: 15px 30px;
          font-size: 1rem;
        }
        .slideshow-container {
          height: 280px;
        }
        .message-card {
          padding: 25px;
        }
        .message-title {
          font-size: 1.5rem;
        }
        .message-text {
          font-size: 1rem;
        }
        .photo-slider {
          max-width: 350px;
        }
        .romantic-title {
          font-size: 1.8rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="particles" id="particles"></div>
    <div class="confetti-container" id="confetti"></div>
    <div class="balloons-container" id="balloons"></div>
    <button class="music-btn" id="musicBtn" title="Putar musik ulang tahun">
      🎵
    </button>

    <div class="container">
      <div class="landing-section" id="landingSection">
        <div class="title-container">
          <h1 class="main-title">
            Happy Birthday<span class="name-highlight">Sayang! ❤️</span>
          </h1>
          <div class="title-decoration">
            <span>💕</span><span>❤️</span><span>💕</span>
          </div>
        </div>
        <button class="surprise-btn" id="surpriseBtn">
          Klik untuk membuka kejutan 🎁
        </button>
      </div>

      <div class="surprise-section" id="surpriseSection">
        <div class="slideshow-container" id="slideshow">
          <div class="slide active">
            <div class="slide-content">
              <div class="slide-emoji">🎂</div>
              <div class="slide-text">Selamat Ulang Tahun!</div>
            </div>
          </div>
          <div class="slide">
            <div class="slide-content">
              <div class="slide-emoji">🎉</div>
              <div class="slide-text">Harapanmu Menjadi Kenyataan!</div>
            </div>
          </div>
          <div class="slide">
            <div class="slide-content">
              <div class="slide-emoji">🌟</div>
              <div class="slide-text">Tahun Baru yang Indah!</div>
            </div>
          </div>
          <div class="slide">
            <div class="slide-content">
              <div class="slide-emoji">💖</div>
              <div class="slide-text">Disayang Selalu!</div>
            </div>
          </div>
          <div class="slide">
            <div class="slide-content">
              <div class="slide-emoji">🥳</div>
              <div class="slide-text">Happy Birthday!</div>
            </div>
          </div>
          <div class="slideshow-dots" id="slideshowDots"></div>
        </div>

        <div class="message-card">
          <h2 class="message-title">💌 Pesan Spesial Untukmu 💌</h2>
          <p class="message-text" id="messageText">
            <span class="typing-cursor"></span>
          </p>
        </div>

        <button class="surprise-btn" id="romanticBtn">
          Lihat Foto Kita 💕
        </button>
      </div>

      <div class="romantic-section" id="romanticSection">
        <div class="romantic-header">
          <h2 class="romantic-title">📸 Momen Kita 💖</h2>
        </div>

        <div class="photo-slider" id="photoSlider"></div>
        <p class="photo-counter" id="photoCounter">1 / 12</p>

        <div class="nav-buttons">
          <button class="nav-btn" id="prevPhotoBtn">← Prev</button>
          <button class="nav-btn" id="nextPhotoBtn">Next →</button>
        </div>
        <button class="back-btn" id="backBtn">← Kembali</button>
      </div>
    </div>

    <script>
      const birthdayName = "Sayang";
      const message = `Selamat ulang tahun yang ke-22 Bucaa Tercinta, ${birthdayName}! 🎂🎉

Di hari spesial ini, aku ingin mengucapkan bahwa kehadiranmu dalam hidupku adalah anugerah yang paling indah. Kamu adalah senyum pagi yang menyegarkan, tawa yang membuat hariku bersinar, dan inspirasi yang membuatku ingin menjadi lebih baik setiap hari.

Doaku untukmu hari ini dan selamanya adalah kebahagiaan yang melimpah, kesehatan yang prima, cinta yang tulus dari orang-orang tersayang, dan kesuksesan dalam setiap langkah hidupmu.

Terima kasih sudah menjadi kamu - seseorang yang begitu luar biasa, baik hati, dan penuh kasih. Kamu membuat dunia ini menjadi tempat yang lebih baik hanya dengan keberadaanmu.

Semoga tahun baru hidupmu dipenuhi dengan moment-moment indah, pencapaian-pencapaian menakjubkan, dan cinta yang tak terhitung.

Aku sangat beruntung memilikimu. Selamat ulang tahun, cintaku! 💕🎁✨

Dengan cinta penuh,
Yang selalu menyayangimu ❤️`;

      const musicBtn = document.getElementById("musicBtn");
      const surpriseBtn = document.getElementById("surpriseBtn");
      const landingSection = document.getElementById("landingSection");
      const surpriseSection = document.getElementById("surpriseSection");
      const romanticSection = document.getElementById("romanticSection");
      const messageText = document.getElementById("messageText");
      const slideshowDots = document.getElementById("slideshowDots");
      const confettiContainer = document.getElementById("confetti");
      const balloonsContainer = document.getElementById("balloons");
      const particlesContainer = document.getElementById("particles");
      const photoSlider = document.getElementById("photoSlider");
      const photoCounter = document.getElementById("photoCounter");

      // SEMUA 12 FOTO DARI FOLDER
      const romanticPhotos = [
        "foto1.jpeg",
        "foto2.jpg",
        "foto3.jpg",
        "foto4.jpeg",
        "foto5.jpeg",
        "foto6.jpg",
        "foto7.jpg",
        "foto8.jpg",
        "foto9.jpg",
        "foto10.jpg",
        "foto11.jpg",
        "foto12.jpg",
      ];
      let currentPhotoIndex = 0;

      function createParticles() {
        for (let i = 0; i < 20; i++) {
          const star = document.createElement("div");
          star.className = "star";
          star.style.left = Math.random() * 100 + "%";
          star.style.top = Math.random() * 100 + "%";
          star.style.animationDelay = Math.random() * 2 + "s";
          particlesContainer.appendChild(star);
        }
        for (let i = 0; i < 15; i++) {
          const heart = document.createElement("div");
          heart.className = "heart";
          heart.innerHTML = ["💕", "💖", "💗", "❤️", "💓"][
            Math.floor(Math.random() * 5)
          ];
          heart.style.left = Math.random() * 100 + "%";
          heart.style.top = Math.random() * 100 + "%";
          heart.style.animationDelay = Math.random() * 2 + "s";
          heart.style.fontSize = Math.random() * 15 + 15 + "px";
          particlesContainer.appendChild(heart);
        }
      }

      function createConfetti() {
        const colors = [
          "#FF69B4",
          "#FFB6C1",
          "#DDA0DD",
          "#87CEEB",
          "#FFD700",
          "#98FB98",
          "#FFA07A",
        ];
        for (let i = 0; i < 100; i++) {
          const confetti = document.createElement("div");
          confetti.className = "confetti";
          confetti.style.left = Math.random() * 100 + "%";
          confetti.style.background =
            colors[Math.floor(Math.random() * colors.length)];
          confetti.style.width = Math.random() * 10 + 5 + "px";
          confetti.style.height = Math.random() * 10 + 5 + "px";
          confetti.style.borderRadius = Math.random() > 0.5 ? "50%" : "0";
          confetti.style.animationDuration = Math.random() * 2 + 2 + "s";
          confetti.style.animationDelay = Math.random() * 2 + "s";
          confettiContainer.appendChild(confetti);
        }
        setTimeout(() => {
          confettiContainer.innerHTML = "";
        }, 6000);
      }

      function createBalloon() {
        const colors = [
          "#FF69B4",
          "#FFB6C1",
          "#DDA0DD",
          "#87CEEB",
          "#FFD700",
          "#FFA07A",
          "#98FB98",
        ];
        const balloon = document.createElement("div");
        balloon.className = "balloon";
        balloon.style.left = Math.random() * 100 + "%";
        balloon.style.background = `linear-gradient(135deg, ${colors[Math.floor(Math.random() * colors.length)]}, ${colors[Math.floor(Math.random() * colors.length)]})`;
        balloon.style.animationDuration = Math.random() * 5 + 8 + "s";
        balloon.style.width = Math.random() * 30 + 50 + "px";
        balloon.style.height = Math.random() * 40 + 70 + "px";
        balloonsContainer.appendChild(balloon);
        setTimeout(() => {
          balloon.remove();
        }, 13000);
      }

      function createSlideshowDots() {
        const slides = document.querySelectorAll(".slide");
        slides.forEach((_, index) => {
          const dot = document.createElement("div");
          dot.className = "dot" + (index === 0 ? " active" : "");
          dot.addEventListener("click", () => goToSlide(index));
          slideshowDots.appendChild(dot);
        });
      }

      let currentSlide = 0;
      function goToSlide(index) {
        const slides = document.querySelectorAll(".slide");
        const dots = document.querySelectorAll(".dot");
        if (slides.length === 0) return;
        slides[currentSlide].classList.remove("active");
        dots[currentSlide].classList.remove("active");
        currentSlide = index;
        slides[currentSlide].classList.add("active");
        dots[currentSlide].classList.add("active");
      }
      function nextSlide() {
        const slides = document.querySelectorAll(".slide");
        if (slides.length === 0) return;
        goToSlide((currentSlide + 1) % slides.length);
      }

      let charIndex = 0;
      function typeMessage() {
        if (charIndex < message.length) {
          const char = message[charIndex];
          if (char === "\n") {
            messageText.innerHTML = messageText.innerHTML.replace(
              '<span class="typing-cursor"></span>',
              '<br><span class="typing-cursor"></span>',
            );
          } else {
            messageText.innerHTML =
              messageText.innerHTML.replace(
                '<span class="typing-cursor"></span>',
                "",
              ) +
              char +
              '<span class="typing-cursor"></span>';
          }
          charIndex++;
          setTimeout(typeMessage, 50);
        }
      }

      // MUSIK DARI FILE local - lagu.mp3
      let birthdayAudio = null;
      let isPlaying = false;
      function playBirthdaySong() {
        if (!birthdayAudio) {
          birthdayAudio = new Audio("lagu.mp3");
          birthdayAudio.loop = true;
        }
        birthdayAudio
          .play()
          .catch((e) =>
            console.log("Autoplay blocked, user must interact first"),
          );
      }
      function stopMusic() {
        if (birthdayAudio) {
          birthdayAudio.pause();
          birthdayAudio.currentTime = 0;
        }
      }
      function toggleMusic() {
        isPlaying = !isPlaying;
        musicBtn.classList.toggle("playing", isPlaying);
        if (isPlaying) {
          playBirthdaySong();
        } else {
          stopMusic();
        }
      }

      let surpriseOpened = false;
      function openSurprise() {
        if (surpriseOpened) return;
        surpriseOpened = true;
        const balloonInterval = setInterval(() => {
          if (!surpriseOpened) {
            clearInterval(balloonInterval);
            return;
          }
          createBalloon();
        }, 800);
        landingSection.style.display = "none";
        surpriseSection.classList.add("active");
        setInterval(nextSlide, 3000);
        setTimeout(typeMessage, 1000);
      }

      function createPhotoSlider() {
        romanticPhotos.forEach((photo, index) => {
          const slide = document.createElement("div");
          slide.className = "photo-slide" + (index === 0 ? " active" : "");
          slide.innerHTML = `<img src="${photo}" alt="Photo ${index + 1}">`;
          photoSlider.appendChild(slide);
        });
        updatePhotoCounter();
      }

      function showPhoto(index) {
        const slides = document.querySelectorAll(".photo-slide");
        slides.forEach((s) => s.classList.remove("active"));
        slides[index].classList.add("active");
        currentPhotoIndex = index;
        updatePhotoCounter();
      }

      function updatePhotoCounter() {
        photoCounter.textContent = `${currentPhotoIndex + 1} / ${romanticPhotos.length}`;
      }

      function prevPhoto() {
        const newIndex =
          currentPhotoIndex === 0
            ? romanticPhotos.length - 1
            : currentPhotoIndex - 1;
        showPhoto(newIndex);
      }

      function nextPhoto() {
        const newIndex =
          currentPhotoIndex === romanticPhotos.length - 1
            ? 0
            : currentPhotoIndex + 1;
        showPhoto(newIndex);
      }

      musicBtn.addEventListener("click", toggleMusic);
      surpriseBtn.addEventListener("click", openSurprise);
      document.getElementById("romanticBtn").addEventListener("click", () => {
        surpriseSection.style.display = "none";
        romanticSection.classList.add("active");
      });
      document.getElementById("backBtn").addEventListener("click", () => {
        romanticSection.classList.remove("active");
        surpriseSection.style.display = "flex";
      });
      document
        .getElementById("prevPhotoBtn")
        .addEventListener("click", prevPhoto);
      document
        .getElementById("nextPhotoBtn")
        .addEventListener("click", nextPhoto);

      createParticles();
      createConfetti();
      createSlideshowDots();
      createPhotoSlider();
      for (let i = 0; i < 8; i++) {
        setTimeout(createBalloon, i * 500);
      }
    </script>
  </body>
</html>
